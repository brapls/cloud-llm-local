<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud 3.0 - Hybrid Sovereign Pipeline</title>

<style>
body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; }
.stage { border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; }
.success { background: #e8f8f5; }
.warning { background: #fef5e7; }

#scoreBar {
    height: 20px;
    border-radius: 10px;
    background: #ddd;
    overflow: hidden;
}
#scoreFill {
    height: 100%;
    width: 0%;
    background: #27ae60;
}
</style>
</head>

<body>

<h2>🚀 Cloud 3.0: Hybrid Sovereign Pipeline</h2>
<p>Status: <span id="status">Ready</span></p>

<div class="stage">
<h3>Input</h3>
<textarea id="input" rows="4" style="width:100%">
My name is Alice and my email is alice@example.com. Summarize my habits.
</textarea>
</div>

<div class="stage">
<h3>Privacy Score</h3>
<div id="scoreBar"><div id="scoreFill"></div></div>
<p id="scoreText">Score: --</p>
</div>

<div class="stage">
    <h3>AI Privacy Analysis</h3>
    <pre id="aiBox">Waiting for AI analysis...</pre>
</div>
<div class="stage">
    <h3>⚠️ Raw AI Output</h3>
    <pre id="rawAI"></pre>
</div>
<div class="stage">
<h3>Pipeline Log</h3>
<pre id="log"></pre>
</div>

<div class="stage">
<h3>Output</h3>
<div id="output"></div>
</div>

<button id="runBtn">Run Pipeline</button>
</body>
<script >
    document.getElementById("runBtn").addEventListener("click", run);
</script>
</html>
