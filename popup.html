<body>
  <h3>Local GPU AI</h3>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="local">Local</div>
    <div class="tab" data-tab="url">URL</div>
    <div class="tab" data-tab="dynamic">Dynamic</div>
  </div>

  <label>Prompt</label>
  <textarea id="prompt"></textarea>
  <!-- Local -->
  <div id="local" class="section active">
    <label>Model</label>
    <select id="modelField">
      <option value="">Select a model</option>
      <!-- Options will be populated by JavaScript -->
    </select>
  </div>

  <!-- URL -->
  <div id="url" class="section">
    <label>URL</label>
    <input type="text" id="urlField" placeholder="https://...?token=...">
  </div>

  <!-- Dynamic -->
  <div id="dynamic" class="section">
    <label>Model</label>
    <select id="dynamic_modelField">
      <option value="">Select a model</option>
      <!-- Options will be populated by JavaScript -->
    </select>

    <label>URL</label>
    <input type="text" id="dynamic_urlField" placeholder="https://...?token=...">
  </div>

  <button id="runBtn">Run</button>

  <h4>Output</h4>
  <pre id="output"></pre>

  <script src="popup.js"></script>
</body>
  <script>
    const modelSelect = document.getElementById("modelField");
    const dynamicModelSelect = document.getElementById("dynamic_modelField");
    models.forEach(model => {
      const option = document.createElement("option");
      option.value = model;
      option.textContent = model;
      modelSelect.appendChild(option);
      
      const option2 = document.createElement("option");
      option2.value = model;
      option2.textContent = model;
      dynamicModelSelect.appendChild(option2);
    });
  </script>
