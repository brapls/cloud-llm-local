<head>
  <title>AI Client</title>
  <style>
    body {
      font-family: Arial;
      padding: 10px;
      width: 360px;
      background: #f7f7f7;
    }

    h3 {
      margin-top: 0;
    }

    /* Tabs */
    .tabs {
      display: flex;
      margin-bottom: 10px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      background: #ddd;
      border: 1px solid #ccc;
    }

    .tab.active {
      background: white;
      font-weight: bold;
    }

    .section {
      display: none;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
    }

    .section.active {
      display: block;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    textarea {
      height: 70px;
      font-family: monospace;
    }

    .small {
      height: 50px;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 5px;
    }

    .row input, .row select {
      flex: 1;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 8px;
      font-size: 11px;
      height: 150px;
      overflow: auto;
    }
  </style>
</head>

<body>

<h3>AI API Client</h3>

<div class="tabs">
  <div class="tab active" data-tab="url">URL</div>
  <div class="tab" data-tab="local">Local using browser and GPU</div>
</div>

<!-- URL TAB -->
<div id="url" class="section active">

  <label>Preset</label>
  <select id="preset">
    <option value="">Custom</option>
    <option value="openai">OpenAI</option>
    <option value="ollama">Ollama</option>
    <option value="hf">HuggingFace</option>
  </select>

  <label>Method</label>
  <select id="method">
    <option>POST</option>
    <option>GET</option>
  </select>

  <label>URL</label>
  <input id="urlField" placeholder="https://api..." />

  <label>Token</label>
  <input id="tokenField" placeholder="Bearer token (optional)" />

  <label>Headers (JSON)</label>
  <textarea id="headersField" class="small">{}</textarea>

  <label>Body Template (JSON)</label>
  <textarea id="templateField">
{
  "prompt": "{{prompt}}"
}
  </textarea>

  <label>Prompt</label>
  <textarea id="urlPrompt"></textarea>

  <label>Response Path</label>
  <input id="responsePath" placeholder="choices[0].message.content" />
  
</div>
<!-- LOCAL TAB -->
<div id="local" class="section">

  <label>Prompt</label>
  <textarea id="localPrompt"></textarea>
  <label>Model</label>
  <select id="modelSelect">
    <script>
      models.forEach(model => {
        document.write(`<option value="${model}">${model}</option>`);
      });</script>
  </select>
</div>
  <button id="runBtn">Send Request</button>


<h4>Response</h4>
<pre id="output"></pre>

<script src="popup.js"></script>

</body>

</html>
